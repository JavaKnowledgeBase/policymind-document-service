
env_file:
  - .env
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  redis:
    host: localhost
    port: 6379

server:
  port: 8080

logging:
  file:
    name: logs/policymind-document-service.log

openai:
 api-key: ${OPENAI_API_KEY}
 
jwt:
 #secret: policymind-production-super-secure-2026-jwt-key
 secret: ${JWT_SECRET}
