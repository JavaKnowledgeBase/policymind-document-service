
env_file:
  - .env
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  redis:
    host: localhost
    port: 6379
  security:
    oauth2:
      client:
        provider:
          microsoft:
            authorization-uri: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/common/oauth2/v2.0/token
            jwk-set-uri: https://login.microsoftonline.com/common/discovery/v2.0/keys
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            user-name-attribute: sub
          linkedin:
            authorization-uri: https://www.linkedin.com/oauth/v2/authorization
            token-uri: https://www.linkedin.com/oauth/v2/accessToken
            user-info-uri: https://api.linkedin.com/v2/userinfo
            user-name-attribute: sub
          twitter:
            authorization-uri: https://twitter.com/i/oauth2/authorize
            token-uri: https://api.twitter.com/2/oauth2/token
            user-info-uri: https://api.twitter.com/2/users/me?user.fields=id,name,username
            user-name-attribute: id
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:disabled-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:disabled-google-client-secret}
            authorization-grant-type: authorization_code
            # Use an explicit backend base URL so local Docker and deployed hosts generate stable OAuth callbacks.
            redirect-uri: "${APP_OAUTH2_BASE_URL:http://localhost:8080}/login/oauth2/code/{registrationId}"
            scope: openid, profile, email
          microsoft:
            provider: microsoft
            client-id: ${MICROSOFT_CLIENT_ID:disabled-microsoft-client-id}
            client-secret: ${MICROSOFT_CLIENT_SECRET:disabled-microsoft-client-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "${APP_OAUTH2_BASE_URL:http://localhost:8080}/login/oauth2/code/{registrationId}"
            scope: openid, profile, email
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:disabled-facebook-client-id}
            client-secret: ${FACEBOOK_CLIENT_SECRET:disabled-facebook-client-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "${APP_OAUTH2_BASE_URL:http://localhost:8080}/login/oauth2/code/{registrationId}"
            scope: public_profile, email
          linkedin:
            provider: linkedin
            client-id: ${LINKEDIN_CLIENT_ID:disabled-linkedin-client-id}
            client-secret: ${LINKEDIN_CLIENT_SECRET:disabled-linkedin-client-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "${APP_OAUTH2_BASE_URL:http://localhost:8080}/login/oauth2/code/{registrationId}"
            scope: openid, profile, email
            client-name: LinkedIn
          twitter:
            provider: twitter
            client-id: ${TWITTER_CLIENT_ID:disabled-twitter-client-id}
            client-secret: ${TWITTER_CLIENT_SECRET:disabled-twitter-client-secret}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            redirect-uri: "${APP_OAUTH2_BASE_URL:http://localhost:8080}/login/oauth2/code/{registrationId}"
            scope: tweet.read, users.read, offline.access

server:
  port: 8080

logging:
  file:
    name: logs/policymind-document-service.log

openai:
 api-key: ${OPENAI_API_KEY}

ai:
  provider:
    embedding: ${AI_EMBEDDING_PROVIDER:openai}

gcp:
  project-id: ${GCP_PROJECT_ID:}
  location: ${GCP_LOCATION:us-central1}
  bearer-token: ${GCP_BEARER_TOKEN:}
  vertex:
    embedding-model: ${GCP_VERTEX_EMBEDDING_MODEL:text-embedding-005}
    chat-model: ${GCP_VERTEX_CHAT_MODEL:gemini-2.0-flash-lite-001}

app:
  oauth2:
    redirect-uri: ${FRONTEND_OAUTH_CALLBACK_URL:http://localhost:5173/auth/callback}
  header-content:
    csv-path: ${HEADER_CONTENT_CSV_PATH:resource_docs/contracts_policies_jokes.csv}
    redis-key: ${HEADER_CONTENT_REDIS_KEY:policymind:header-content}
 
jwt:
 #secret: policymind-production-super-secure-2026-jwt-key
 secret: ${JWT_SECRET}
